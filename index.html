<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小费分配助手</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card hero">
      <div>
        <p class="eyebrow">Tip Helper</p>
        <h1>小费分配助手</h1>
        <p class="muted">输入总小费和每个人的两段工作时间，自动计算 Boss、Kitchen、每小时小费、个人分配和剩余金额。</p>
      </div>
      <button id="resetBtn" class="ghost">重置</button>
    </section>

    <section class="grid">
      <section class="card">
        <h2>输入区</h2>
        <label class="field">
          <span>Tip Total</span>
          <input id="tipTotal" type="number" min="0" step="0.01" placeholder="Input" />
        </label>

        <div class="split">
          <label class="field">
            <span>Boss %</span>
            <input id="bossPercent" type="number" min="0" max="100" step="1" value="10" />
          </label>
          <label class="field">
            <span>Kitchen %</span>
            <input id="kitchenPercent" type="number" min="0" max="100" step="1" value="10" />
          </label>
        </div>

        <div class="tableHeader">
          <h3>员工时间</h3>
          <button id="addPersonBtn" class="secondary">+ 添加</button>
        </div>

        <div class="peopleTable">
          <div class="row head workHeader">
            <span>Name</span>
            <span>Work Time</span>
            <span>Hours</span>
            <span></span>
          </div>
          <div id="peopleRows"></div>
        </div>
      </section>

      <section class="card result">
        <h2>结果显示区</h2>
        <div class="summary">
          <div><span>Boss</span><strong id="bossTip">$0</strong></div>
          <div><span>Kitchen</span><strong id="kitchenTip">$0</strong></div>
          <div><span>Subtotal</span><strong id="subtotal">$0</strong></div>
          <div><span>Total Hour</span><strong id="totalHours">0</strong></div>
          <div><span>Tips / h</span><strong id="tipPerHour">$0</strong></div>
          <div><span>Remaining</span><strong id="remaining">$0</strong></div>
        </div>

        <h3>个人分配</h3>
        <div class="payoutTable">
          <div class="row head"><span>Name</span><span>Tip</span></div>
          <div id="payoutRows"></div>
          <div class="row total"><span>Sum</span><strong id="sumPayout">$0</strong></div>
        </div>
      </section>
    </section>
  </main>

  <div id="timePickerOverlay" class="timePickerOverlay hidden">
    <div class="timePickerModal">
      <div class="timePickerHeader">
        <h3>选择时间段</h3>
        <button id="closeTimePickerBtn" class="ghost" type="button">关闭</button>
      </div>

      <div class="selectedRange">
        <strong id="selectedRangeText">00:00 - 00:00</strong>
      </div>

      <label class="sliderField">
        <span>Start</span>
        <input id="startSlider" type="range" min="0" max="95" step="1" value="0" />
        <div class="sliderTicks">
          <span>0</span><span>3</span><span>6</span><span>9</span><span>12</span><span>15</span><span>18</span><span>21</span><span>24</span>
        </div>
      </label>

      <label class="sliderField">
        <span>End</span>
        <input id="endSlider" type="range" min="0" max="95" step="1" value="0" />
        <div class="sliderTicks">
          <span>0</span><span>3</span><span>6</span><span>9</span><span>12</span><span>15</span><span>18</span><span>21</span><span>24</span>
        </div>
      </label>

      <div class="sliderHint">每一格 = 15 分钟。滑动选择开始和结束时间。</div>

      <button id="saveTimePickerBtn" class="secondary" type="button">保存时间段</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
